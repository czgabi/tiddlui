<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="180" y1="180" x2="860" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00d9ff" />
      <stop offset="0.55" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0c15" />
      <stop offset="1" stop-color="#181030" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#3aa6ff" stop-opacity="0.35" />
      <stop offset="1" stop-color="#3aa6ff" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)" />
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#glow)" />
  <rect x="6" y="6" width="1012" height="1012" rx="228" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" />

  <!-- disc ring -->
  <circle cx="512" cy="486" r="276" fill="none" stroke="url(#accent)" stroke-width="78" />
  <circle cx="512" cy="486" r="276" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="78" />

  <!-- download arrow inside -->
  <g filter="url(#soft)" opacity="0.5">
    <path d="M512 318 V566 M512 566 L420 474 M512 566 L604 474" stroke="#bfe9ff" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <path d="M512 318 V566 M512 566 L420 474 M512 566 L604 474" stroke="#eaf7ff" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- waveform baseline (music) -->
  <path d="M300 740 q40 -70 80 0 q40 70 80 0 q40 -70 80 0 q40 70 80 0 q40 -70 80 0"
        fill="none" stroke="url(#accent)" stroke-width="26" stroke-linecap="round" />
</svg>
