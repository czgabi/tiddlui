name: Build & Release

# Builds the Windows installer in the cloud and attaches it to a GitHub Release.
# Triggered only when a version tag is pushed (e.g. `git tag v1.2.0 && git push
# origin v1.2.0`) — so day-to-day commits to main never trigger a build; you opt
# in by tagging a release. Can also be run manually from the Actions tab.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# If a tag is re-pushed (e.g. moved to a fixed commit), cancel the stale run so
# it can't attach outdated assets to the release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed to create the Release and upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build Python sidecar engine
        shell: pwsh
        run: |
          pip install -r sidecar/requirements.txt
          cd sidecar
          ./build.ps1

      # The pushed tag (e.g. v1.4.0) is the source of truth: stamp it into both
      # version files so the installer and the in-app About box always match it.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $v = '${{ github.ref_name }}'.TrimStart('v')
          $repl = '${1}' + $v + '${2}'
          (Get-Content package.json -Raw) -replace '("version":\s*")[^"]*(")', $repl | Set-Content -NoNewline package.json
          (Get-Content src-tauri/tauri.conf.json -Raw) -replace '("version":\s*")[^"]*(")', $repl | Set-Content -NoNewline src-tauri/tauri.conf.json
          Write-Host "Synced version to $v"

      # Build the release body from this tag's CHANGELOG section so the notes are
      # attached automatically when the release is created.
      - name: Extract release notes from CHANGELOG
        id: notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $lines = Get-Content CHANGELOG.md
          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i].Trim() -eq "## $version") { $start = $i + 1; break }
          }
          if ($start -lt 0) {
            $body = "See CHANGELOG.md."
          } else {
            $section = New-Object System.Collections.Generic.List[string]
            for ($i = $start; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match '^## ') { break }
              $section.Add($lines[$i])
            }
            $body = ($section -join "`n").Trim()
          }
          $body = "$body`n`nDownload the ``Tiddlui_*_x64-setup.exe`` asset below and run it to install."
          Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<__NOTES__"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $body
          Add-Content -Path $env:GITHUB_OUTPUT -Value "__NOTES__"

      - name: Build app & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          # Auto-injected, repo-scoped token — no manual secret to manage.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Tiddlui ${{ github.ref_name }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
